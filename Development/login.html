<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartCafe Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: '#8c4a2f',
              brandDark: '#992f24',
            },
            boxShadow: {
              glass: '0 35px 120px rgba(15, 23, 42, 0.12)',
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(251,146,60,0.12),_transparent_30%),_linear-gradient(180deg,_#f8fafc_0%,_#ffffff_100%)] text-slate-900">
    <main class="mx-auto flex min-h-screen w-full items-center justify-center px-6 py-12 sm:px-8">
      <section class="w-full max-w-md rounded-[2rem] bg-white/95 p-8 shadow-glass backdrop-blur-xl sm:p-10">
        <header class="text-center">
          <p class="text-2xl font-semibold text-slate-950">SmartCafe</p>
          <p class="mt-2 text-sm uppercase tracking-[0.28em] text-slate-500">The Modern Restro</p>
        </header>

        <div class="mt-10 space-y-3 text-center">
          <h1 id="login-heading" class="text-3xl font-semibold text-slate-950">Welcome Back</h1>
          <p class="mx-auto max-w-xs text-sm leading-6 text-slate-600">Please enter your details to access your dashboard.</p>
        </div>

        <form class="mt-10 space-y-6" action="#" method="post">
          <div class="space-y-2">
            <label for="email" class="block text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">Email Address</label>
            <input id="email" name="email" type="email" placeholder="chahanaacharya7@gmail.com" autocomplete="email" required class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-brand focus:ring-4 focus:ring-brand/10" />
          </div>

          <div class="space-y-2">
            <label for="password" class="block text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">Password</label>
            <input id="password" name="password" type="password" placeholder="********" autocomplete="current-password" required class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-brand focus:ring-4 focus:ring-brand/10" />
          </div>

          <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <label class="inline-flex items-center gap-3 text-sm text-slate-600">
              <input type="checkbox" name="remember" class="h-4 w-4 rounded border-slate-300 text-brand focus:ring-brand" />
              Remember me
            </label>
            <a href="#" class="text-sm font-semibold text-brand transition hover:text-brandDark">Forgot Password?</a>
          </div>

          <button type="submit" class="w-full rounded-2xl bg-brand px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-brand/20 transition hover:bg-brandDark">Login →</button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-600">
          Don’t have an account yet? <a href="#" class="font-semibold text-brand transition hover:text-brandDark">Register</a>
        </p>
      </section>
    </main>
  </body>
</html>
